name: Publish to Maven Central

# Bintray/jCenter have been shut down. Releases now go to Maven Central via the
# Sonatype Central Portal. Triggered when a GitHub Release is published, or
# manually from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Grant Permission to Execute
        run: chmod +x gradlew

      - name: Build signed Central bundle
        env:
          # ASCII-armored PGP secret key and its passphrase.
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew clean centralBundle --no-daemon

      - name: Upload bundle to the Central Portal
        env:
          # Central Portal user token: name + secret from https://central.sonatype.com/account
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          BUNDLE=$(ls build/distributions/central-bundle-*.zip)
          AUTH=$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 -w0)
          # publishingType=USER_MANAGED uploads to a staging deployment that you
          # review and release manually in the Portal UI. Use AUTOMATIC to release
          # immediately once validation passes.
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${AUTH}" \
            -F "bundle=@${BUNDLE}" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=USER_MANAGED"

      - name: Archive bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: central-bundle
          path: build/distributions/central-bundle-*.zip
