dist: focal

language: java
jdk:
  - openjdk11

# No `services: mongodb` — the test suite starts its own embedded MongoDB on
# port 27017 via the com.sourcemuse.mongo Gradle plugin; a system mongod would
# conflict on that port.

install: ./gradlew assemble

cache:
  directories:
  - $HOME/.gradle

script: ./gradlew check --info --stacktrace
